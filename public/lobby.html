<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby</title>
    <script type="module" src="scripts/lobby/lobby.js"></script>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/playful-avatars/index.js"
    ></script>
    <link rel="stylesheet" href="./styles/players.css">
    <link rel="stylesheet" href="./styles/lobby.css">
    <link rel="stylesheet" href="./styles/components_style.css">
  </head>

  <body>
    <main>
      <div id="players-container"></div>
      <div id="lobby-details">
        <template id="room-id-template">
          <span id="room-id">RoomId : </span>
        </template>
        <div id="room-id-container"></div>
        <div id="message">
          Waiting for players ...
        </div>

        <template id="join-room-template">
          <div id="join-room-id">
            <form action="/join-room">
              <input type="text">
              <button type="submit">enter</button>
            </form>
          </div>
        </template>
        <template id="game-start-btn"></template>
        <div id="nav-container">
          <div id="navigations"></div>
          <button id="leave-button" type="button">Leave</button>
        </div>
      </div>
    </main>
    <template id="player-template">
      <div class="player-container">
        <div class="player-avatar"></div>
        <div class="player-name-container"></div>
      </div>
    </template>
  </body>
</html>
