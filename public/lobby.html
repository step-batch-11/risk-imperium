<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby</title>
    <script type="module" src="scripts/lobby/lobby.js"></script>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/playful-avatars/index.js"
    ></script>
    <link rel="stylesheet" href="./styles/players.css">
    <link rel="stylesheet" href="./styles/lobby.css">
    <link rel="stylesheet" href="./styles/components_style.css">
  </head>

  <body>
    <main>
      <div id="players-container">
        <div id="player-1" class="player-container">
          <div class="player-avatar"></div>
          <div class="player-name-container"></div>
        </div>

        <div id="player-2" class="player-container">
          <div class="player-avatar"></div>
          <div class="player-name-container">----</div>
        </div>

        <div id="player-3" class="player-container">
          <div class="player-avatar"></div>
          <div class="player-name-container">----</div>
        </div>

        <div id="player-4" class="player-container">
          <div class="player-avatar"></div>
          <div class="player-name-container">----</div>
        </div>

        <div id="player-5" class="player-container">
          <div class="player-avatar"></div>
          <div class="player-name-container">----</div>
        </div>

        <div id="player-6" class="player-container">
          <div class="player-avatar"></div>
          <div class="player-name-container">----</div>
        </div>
      </div>
      <div id="lobby-details">
        <div id="room-id-container">
          <h3>Room Id : <span id="room-id"></span></h3>
          <div id="message">
            <p id="waiting">Waiting for players</p>
            <p id="dots"></p>
          </div>
        </div>

        <template id="join-room-template">
          <div id="join-room-id">
            <form action="/join-room">
              <input type="text">
              <button type="submit">enter</button>
            </form>
          </div>
        </template>

        <div id="nav-container">
          <button id="leave-button" type="button">Leave</button>
        </div>
      </div>
    </main>
    <template id="player-template">
      <div class="player-container">
        <div class="player-avatar"></div>
        <div class="player-name-container"></div>
      </div>
    </template>
  </body>
</html>
