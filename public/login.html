<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
  </head>

  <body>
    <form method="post" action="/login">
      <label for="username-input">Username</label>
      <input
        type="text"
        name="username"
        id="username-input"
        placeholder="username"
      >
      <button type="submit">Login</button>
    </form>
  </body>
</html>
