<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Home</title>
    <link rel="stylesheet" href="./styles/home.css" />
  </head>
  <body>
    <main>
      <section id="image-container">
        <img
          src="./assets/risk_logo.png"
          alt="risk_logo.png"
          id="risk-logo-img"
        >
      </section>
      <section id="content-container">
        <header id="game-heading">
          <h1>Risk</h1>
          <h2>The world of global domination</h2>
        </header>

        <div id="game-info">
          <button id="game-info-btn">&#9432;</button>
        </div>

        <div id="actions-panel">
          <div id="quick-play-actions">
            <button id="quick-play-btn">Quick play</button>
          </div>

          <div id="room-actions">
            <button id="create-room-btn">Create Room</button>
            <button id="join-room-btn">Join Room</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
